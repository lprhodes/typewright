<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typewright — fast Markdown + MDX editor</title>
    <style>
      :root {
        --ui: -apple-system, "SF Pro Text", BlinkMacSystemFont, system-ui, sans-serif;
        --disp: -apple-system, "SF Pro Display", system-ui, sans-serif;
        --mono: "SF Mono", ui-monospace, Menlo, monospace;
        --bg: #0b0d0f; --surface: #121519; --surface-2: #161a1f; --line: rgba(255,255,255,.09);
        --text: #e8eaed; --text-2: #a3abb2; --text-3: #6a727a; --accent: #6ea3ff; --accent-soft: rgba(110,163,255,.14);
      }
      :root[data-theme="light"] {
        --bg: #f5f6f8; --surface: #fff; --surface-2: #fbfbfc; --line: rgba(18,22,27,.1);
        --text: #171a1d; --text-2: #5a6169; --text-3: #8b929a; --accent: #2f6fed; --accent-soft: rgba(47,111,237,.1);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: var(--ui); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }
      a { color: var(--accent); }
      .wrap { max-width: 900px; margin: 0 auto; padding: 0 24px; }
      .topbar { position: sticky; top: 0; z-index: 20; backdrop-filter: blur(18px) saturate(1.5); background: color-mix(in srgb, var(--bg) 74%, transparent); border-bottom: 1px solid var(--line); }
      .topbar .row { display: flex; align-items: center; gap: 14px; height: 58px; }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 640; letter-spacing: -.02em; font-size: 16px; }
      .brand .glyph { width: 26px; height: 26px; border-radius: 7px; background: linear-gradient(155deg,#7db1ff,#6e7bff 55%,#b98bff); display: grid; place-items: center; color: #0b0d0f; font-weight: 800; font-family: var(--disp); font-size: 15px; box-shadow: inset 0 1px 0 rgba(255,255,255,.5); }
      .spacer { flex: 1; }
      .tlink { color: var(--text-2); text-decoration: none; font-size: 14px; padding: 7px 9px; border-radius: 8px; }
      .tlink:hover { color: var(--text); background: var(--accent-soft); }
      .iconbtn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface-2); color: var(--text-2); display: grid; place-items: center; cursor: pointer; }
      .iconbtn:hover { color: var(--text); }
      .hero { padding: 60px 0 26px; text-align: center; }
      .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 560; color: var(--accent); background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); padding: 5px 12px; border-radius: 999px; margin-bottom: 20px; }
      .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
      h1.title { font-family: var(--disp); font-size: clamp(32px,5.5vw,52px); line-height: 1.03; letter-spacing: -.035em; font-weight: 680; margin: 0 auto 16px; max-width: 16ch; }
      h1.title em { font-style: normal; color: transparent; background: linear-gradient(120deg,var(--accent),#b98bff 80%); -webkit-background-clip: text; background-clip: text; }
      .sub { font-size: 17px; color: var(--text-2); max-width: 60ch; margin: 0 auto; }
      .install { display: inline-flex; gap: 9px; margin-top: 22px; font-family: var(--mono); font-size: 13.5px; color: var(--text-2); background: var(--surface); border: 1px solid var(--line); padding: 9px 13px; border-radius: 10px; }
      .install .pl { color: var(--text-3); }
      .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; box-shadow: 0 24px 60px -20px rgba(0,0,0,.5); }
      .card-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--line); background: var(--surface-2); flex-wrap: wrap; }
      .traffic { display: flex; gap: 7px; } .traffic i { width: 11px; height: 11px; border-radius: 50%; }
      .traffic i:nth-child(1){background:#ec6a5e} .traffic i:nth-child(2){background:#f4bf4f} .traffic i:nth-child(3){background:#61c554}
      .doc-name { font-family: var(--mono); font-size: 12.5px; color: var(--text-2); }
      .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; padding: 3px; gap: 2px; }
      .seg button { border: 0; background: transparent; color: var(--text-2); font-size: 12.5px; font-weight: 540; padding: 5px 11px; border-radius: 6px; cursor: pointer; }
      .seg button[aria-pressed="true"] { color: var(--text); background: var(--surface); box-shadow: 0 1px 2px rgba(0,0,0,.25); }
      .editor-host { min-height: 340px; max-height: 520px; overflow: auto; }
      .section-label { font-size: 12.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); font-weight: 600; margin: 44px 0 8px; }
      .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 9px; font-weight: 540; font-size: 14px; border: 1px solid var(--line); background: var(--surface-2); color: var(--text); cursor: pointer; }
      .btn:hover { border-color: color-mix(in srgb, var(--text) 20%, transparent); }
      .meta { margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--text-3); }
      .note { margin: 18px 0 0; font-size: 13.5px; color: var(--text-2); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; background: var(--surface); }
      .note b { color: var(--text); font-weight: 600; }
      footer { border-top: 1px solid var(--line); margin-top: 60px; padding: 30px 0 60px; color: var(--text-3); font-size: 13.5px; }
      footer .frow { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
      footer a { color: var(--text-2); text-decoration: none; } footer a:hover { color: var(--text); }

      /* ---- rich chrome (real editor + design-preview surfaces) ---- */
      .glyph-mono { font-family: var(--mono); }
      .preview-tag { font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #e0b24d; background: rgba(224,178,77,.16); border: 1px solid rgba(224,178,77,.4); border-radius: 999px; padding: 1px 7px; }
      .presence { display: flex; align-items: center; }
      .presence .av { width: 25px; height: 25px; border-radius: 50%; display: grid; place-items: center; font-size: 10.5px; font-weight: 640; color: #0b0d0f; border: 2px solid var(--surface); margin-left: -7px; }
      .presence .av:first-child { margin-left: 0; }
      .cbtn2 { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-2); border: 1px solid var(--line); background: var(--surface-2); padding: 6px 11px; border-radius: 9px; cursor: pointer; }
      .cbtn2:hover, .cbtn2.on { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
      .cbtn2 .cnt { background: var(--accent); color: #08111f; font-size: 11px; font-weight: 640; border-radius: 999px; padding: 0 6px; }

      .layout { display: grid; grid-template-columns: 1fr 288px; }
      @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .side { border-left: 0 !important; border-top: 1px solid var(--line); } }
      .editor-col { position: relative; overflow: hidden; }

      .toolbar { display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap; padding: 6px 8px; margin: 10px 14px 2px; background: color-mix(in srgb, var(--surface-2) 82%, transparent); backdrop-filter: blur(20px) saturate(1.6); border: 1px solid var(--line); border-radius: 13px; box-shadow: 0 4px 14px -6px rgba(0,0,0,.26); }
      .toolbar.floatmode { max-height: 0; margin-top: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; opacity: 0; overflow: hidden; border-color: transparent; box-shadow: none; transition: max-height .28s cubic-bezier(.32,.72,0,1), opacity .2s, margin .28s, padding .28s; }
      .editor-col:hover .toolbar.floatmode, .toolbar.floatmode.pinned { max-height: 120px; margin-top: 10px; margin-bottom: 2px; padding-top: 6px; padding-bottom: 6px; opacity: 1; border-color: var(--line); box-shadow: 0 4px 14px -6px rgba(0,0,0,.26); }
      .tgrp { display: inline-flex; gap: 2px; } .tsep { width: 1px; height: 18px; background: var(--line); margin: 0 4px; }
      .tbtn { min-width: 28px; height: 28px; padding: 0 6px; border: 1px solid transparent; background: transparent; border-radius: 7px; color: var(--text-2); display: inline-flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; }
      .tbtn:hover { color: var(--text); background: var(--accent-soft); }
      .tbtn.b { font-weight: 800; } .tbtn.i { font-style: italic; font-family: Georgia, serif; } .tbtn.s { text-decoration: line-through; }
      .tbtn svg { width: 15px; height: 15px; }

      .side { border-left: 1px solid var(--line); background: var(--surface-2); display: flex; flex-direction: column; }
      .side-tabs { display: flex; padding: 8px 8px 0; gap: 4px; border-bottom: 1px solid var(--line); }
      .side-tabs button { flex: 1; border: 0; background: none; color: var(--text-3); font-size: 13px; font-weight: 540; padding: 8px 0 10px; border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
      .side-tabs button[aria-selected="true"] { color: var(--text); border-bottom-color: var(--accent); }
      .side-tabs .badge { background: var(--surface); color: var(--text-2); font-size: 11px; border-radius: 999px; padding: 0 6px; }
      .pane { padding: 15px; display: flex; flex-direction: column; gap: 16px; overflow: auto; flex: 1; }
      .pane[hidden] { display: none; }
      .pane h4 { margin: 0 0 2px; font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); font-weight: 600; display: flex; align-items: center; gap: 8px; }
      .toggle { display: flex; align-items: center; justify-content: space-between; padding: 6px 7px; border-radius: 8px; }
      .toggle:hover { background: var(--surface); }
      .toggle label { font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
      .toggle .tk { font-family: var(--mono); font-size: 10.5px; color: var(--text-3); }
      .sw { width: 36px; height: 21px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); position: relative; cursor: pointer; flex: none; }
      .sw::after { content: ""; position: absolute; top: 2px; left: 2px; width: 15px; height: 15px; border-radius: 50%; background: #fff; transition: transform .2s cubic-bezier(.32,.72,0,1); box-shadow: 0 1px 3px rgba(0,0,0,.4); }
      .sw[aria-checked="true"] { background: var(--accent); } .sw[aria-checked="true"]::after { transform: translateX(15px); }
      .props { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 11px; font-family: var(--mono); font-size: 11.5px; line-height: 1.6; color: var(--text-2); overflow-x: auto; }
      .props .k { color: #d2a8ff; } .props .s2 { color: #7ee787; } .props .t { color: #79c0ff; }
      .tip { display: flex; gap: 8px; font-size: 12.5px; color: var(--text-3); line-height: 1.5; padding: 10px 11px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; }

      .cthread { border: 1px solid var(--line); border-radius: 11px; padding: 11px; margin-bottom: 10px; background: var(--surface); }
      .cquote { font-size: 12px; color: var(--text-3); border-left: 2px solid rgba(224,178,77,.7); padding-left: 8px; margin-bottom: 8px; font-style: italic; }
      .cmt { display: flex; gap: 8px; margin-bottom: 7px; }
      .cmt .av { width: 23px; height: 23px; border-radius: 50%; display: grid; place-items: center; font-size: 10px; font-weight: 640; color: #0b0d0f; flex: none; }
      .cmt .who { font-size: 12.5px; font-weight: 600; } .cmt .when { font-size: 11px; color: var(--text-3); margin-left: 6px; font-weight: 400; }
      .cmt .ct { font-size: 13px; color: var(--text); }
      .reacts { display: flex; gap: 5px; flex-wrap: wrap; margin: 5px 0 3px 31px; }
      .react { font-size: 12px; border: 1px solid var(--line); background: var(--surface-2); border-radius: 999px; padding: 2px 8px; cursor: pointer; }
      .react.on { border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: var(--accent-soft); color: var(--accent); }
      .creplies { margin-left: 31px; border-left: 1px solid var(--line); padding-left: 10px; margin-top: 5px; }
      .cempty { color: var(--text-3); font-size: 13px; text-align: center; padding: 24px 12px; }
