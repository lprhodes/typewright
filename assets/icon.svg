<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Typewright app icon">
  <defs>
    <linearGradient id="tw-tile" x1="150" y1="110" x2="900" y2="950" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fb2ff"/>
      <stop offset="0.52" stop-color="#6d74ff"/>
      <stop offset="1" stop-color="#9a63ef"/>
    </linearGradient>
    <linearGradient id="tw-gloss" x1="0" y1="80" x2="0" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tw-floor" x1="0" y1="600" x2="0" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25165f" stop-opacity="0"/>
      <stop offset="1" stop-color="#25165f" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="tw-glyph" x1="512" y1="340" x2="512" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f0ff"/>
    </linearGradient>
    <linearGradient id="tw-caret" x1="0" y1="460" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaf3ff"/>
      <stop offset="1" stop-color="#bcd6ff"/>
    </linearGradient>
    <clipPath id="tw-clip"><rect x="80" y="80" width="864" height="864" rx="193"/></clipPath>
    <filter id="tw-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDev="15" flood-color="#0b0740" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="80" y="80" width="864" height="864" rx="193" fill="url(#tw-tile)"/>
  <g clip-path="url(#tw-clip)">
    <rect x="80" y="80" width="864" height="864" fill="url(#tw-gloss)"/>
    <rect x="80" y="80" width="864" height="864" fill="url(#tw-floor)"/>
    <!-- faint document rules behind the mark, for 'editor' texture -->
    <g stroke="#ffffff" stroke-opacity="0.10" stroke-width="14" stroke-linecap="round">
      <line x1="300" y1="628" x2="724" y2="628"/>
      <line x1="300" y1="690" x2="600" y2="690"/>
    </g>
  </g>
  <!-- top inner highlight -->
  <rect x="83" y="83" width="858" height="858" rx="190" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2.5"/>

  <!-- glyph: T + text caret -->
  <g filter="url(#tw-shadow)">
    <!-- crossbar -->
    <rect x="290" y="352" width="444" height="96" rx="30" fill="url(#tw-glyph)"/>
    <!-- stem -->
    <rect x="460" y="352" width="104" height="372" rx="30" fill="url(#tw-glyph)"/>
  </g>
  <!-- text caret (I-beam) -->
  <g fill="url(#tw-caret)">
    <rect x="606" y="470" width="26" height="244" rx="13"/>
    <rect x="586" y="470" width="66" height="16" rx="8"/>
    <rect x="586" y="698" width="66" height="16" rx="8"/>
  </g>
</svg>
